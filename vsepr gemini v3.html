<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSEPR with Lone Pairs</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        /* UI Overlay */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            max-width: 450px;
            user-select: none;
        }
        
        h1 { margin: 0; font-weight: 300; letter-spacing: 2px; font-size: 1.4rem; text-shadow: 0 0 10px rgba(52, 152, 219, 0.5); }
        .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 15px; display: block;}

        .panel { 
            pointer-events: auto; 
            background: rgba(20, 20, 20, 0.8); 
            padding: 20px; 
            border-radius: 12px; 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .readout {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .readout-item { margin-bottom: 5px; }
        .label { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 1.1rem; color: #fff; font-weight: 600; }
        .highlight { color: #f1c40f; } /* Yellow for Molecular Geo */

        /* Button Grid */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-size: 0.75rem; color: #aaa; }

        button {
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        
        button:hover { background: #444; }
        button:active { transform: scale(0.98); }

        .btn-row { display: flex; gap: 5px; }
        .btn-row button { flex: 1; }

        .legend {
            margin-top: 10px;
            font-size: 0.75rem;
            color: #666;
            display: flex;
            gap: 15px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-atom { background: #3498db; }
        .dot-lone { background: #f1c40f; box-shadow: 0 0 5px #f1c40f; }

        /* Tooltip */
        .instruction {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #666;
            font-size: 0.8rem;
            pointer-events: none;
            letter-spacing: 1px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <div class="panel">
            <h1>VSEPR Simulator</h1>
            <span class="subtitle">Drag atoms to feel the repulsion forces</span>
            
            <div class="controls">
                <div class="control-group">
                    <label>Bonding Atoms (Blue)</label>
                    <div class="btn-row">
                        <button onclick="updateCounts('bp', -1)">-</button>
                        <span id="bp-display" style="display:flex; align-items:center; justify-content:center; width:30px; font-weight:bold;">2</span>
                        <button onclick="updateCounts('bp', 1)">+</button>
                    </div>
                </div>
                <div class="control-group">
                    <label>Lone Pairs (Glowing)</label>
                    <div class="btn-row">
                        <button onclick="updateCounts('lp', -1)">-</button>
                        <span id="lp-display" style="display:flex; align-items:center; justify-content:center; width:30px; font-weight:bold;">0</span>
                        <button onclick="updateCounts('lp', 1)">+</button>
                    </div>
                </div>
            </div>

            <div class="readout">
                <div class="readout-item">
                    <div class="label">Electron Geometry (Parent)</div>
                    <div class="value" id="elec-geo">Linear</div>
                </div>
                <div class="readout-item">
                    <div class="label">Molecular Geometry (Shape)</div>
                    <div class="value highlight" id="mol-geo">Linear</div>
                </div>
            </div>

            <div class="legend">
                <span><span class="dot dot-atom"></span>Atom</span>
                <span><span class="dot dot-lone"></span>Lone Pair (High Repulsion)</span>
            </div>
        </div>
    </div>

    <div class="instruction">Left Click + Drag to move domains | Right Click to Rotate View</div>
    <div id="canvas-container"></div>

<script>
    // --- State ---
    let numBP = 2;
    let numLP = 0;
    
    // --- Physics Constants ---
    const ATOM_RADIUS = 0.6;
    const BP_RADIUS = 0.35;
    const LP_RADIUS = 0.5; // Visual size (larger cloud)
    const BOND_LENGTH = 2.8;
    
    // Repulsion Multipliers (The Core Physics Logic)
    // LP-LP > LP-BP > BP-BP
    const FORCE_BP_BP = 0.8;
    const FORCE_BP_LP = 1.8; 
    const FORCE_LP_LP = 3.5; // Very strong repulsion!
    
    const DAMPING = 0.90;

    // --- Three.js Globals ---
    let scene, camera, renderer;
    let centralAtom;
    let domains = []; // The movable objects
    let bonds = [];   // The cylinders connecting them
    let domainData = []; // Stores type ('bp' or 'lp') and velocity
    
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let isDragging = false;
    let draggedIdx = -1;
    let dragPlane;

    init();
    animate();

    function init() {
        // Setup Scene
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.04);

        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 10;
        camera.position.y = 3;
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const mainLight = new THREE.PointLight(0xffffff, 1.5, 50);
        mainLight.position.set(5, 10, 5);
        scene.add(mainLight);
        const backLight = new THREE.PointLight(0x3498db, 1, 20);
        backLight.position.set(-5, -5, -10);
        scene.add(backLight);

        // Central Atom
        const caGeo = new THREE.SphereGeometry(ATOM_RADIUS, 32, 32);
        const caMat = new THREE.MeshPhysicalMaterial({
            color: 0x8e44ad, metalness: 0.2, roughness: 0.2, clearcoat: 1.0
        });
        centralAtom = new THREE.Mesh(caGeo, caMat);
        scene.add(centralAtom);

        // Drag Plane
        dragPlane = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshBasicMaterial({ visible: false }));
        scene.add(dragPlane);

        // Initial Spawn
        rebuildMolecule();

        // Listeners
        window.addEventListener('resize', onWindowResize, false);
        document.addEventListener('mousedown', onMouseDown, false);
        document.addEventListener('mousemove', onMouseMove, false);
        document.addEventListener('mouseup', onMouseUp, false);
    }

    function updateCounts(type, change) {
        if(type === 'bp') numBP += change;
        if(type === 'lp') numLP += change;

        // Constraints
        if(numBP < 2) numBP = 2; // Min 2 atoms to make sense
        if(numLP < 0) numLP = 0;
        if((numBP + numLP) > 6) { // Max 6 domains for this demo
             if(type === 'bp') numBP -= change;
             else numLP -= change;
        }

        document.getElementById('bp-display').innerText = numBP;
        document.getElementById('lp-display').innerText = numLP;
        
        rebuildMolecule();
    }

    function getGeometryName(total, lp) {
        // Simple Lookup Table
        if (total === 2) return { elec: "Linear", mol: "Linear" };
        if (total === 3) {
            if (lp === 0) return { elec: "Trigonal Planar", mol: "Trigonal Planar" };
            if (lp === 1) return { elec: "Trigonal Planar", mol: "Bent" };
        }
        if (total === 4) {
            if (lp === 0) return { elec: "Tetrahedral", mol: "Tetrahedral" };
            if (lp === 1) return { elec: "Tetrahedral", mol: "Trigonal Pyramidal" };
            if (lp === 2) return { elec: "Tetrahedral", mol: "Bent" };
        }
        if (total === 5) {
            if (lp === 0) return { elec: "Trigonal Bipyramidal", mol: "Trigonal Bipyramidal" };
            if (lp === 1) return { elec: "Trigonal Bipyramidal", mol: "See-saw" };
            if (lp === 2) return { elec: "Trigonal Bipyramidal", mol: "T-shaped" };
            if (lp === 3) return { elec: "Trigonal Bipyramidal", mol: "Linear" };
        }
        if (total === 6) {
            if (lp === 0) return { elec: "Octahedral", mol: "Octahedral" };
            if (lp === 1) return { elec: "Octahedral", mol: "Square Pyramidal" };
            if (lp === 2) return { elec: "Octahedral", mol: "Square Planar" };
        }
        return { elec: "Complex", mol: "Complex" };
    }

    function rebuildMolecule() {
        // Clear old
        domains.forEach(d => scene.remove(d));
        bonds.forEach(b => scene.remove(b));
        domains = [];
        bonds = [];
        domainData = [];

        // Update Text
        const names = getGeometryName(numBP + numLP, numLP);
        document.getElementById('elec-geo').innerText = names.elec;
        document.getElementById('mol-geo').innerText = names.mol;

        // Create Bonding Pairs
        const bpGeo = new THREE.SphereGeometry(BP_RADIUS, 32, 32);
        const bpMat = new THREE.MeshPhysicalMaterial({ color: 0x3498db, metalness: 0.1, roughness: 0.1 });
        
        // Create Lone Pairs (Clouds)
        const lpGeo = new THREE.SphereGeometry(LP_RADIUS, 32, 32);
        // "Ghostly" yellow material
        const lpMat = new THREE.MeshPhysicalMaterial({ 
            color: 0xf1c40f, 
            metalness: 0.0, 
            roughness: 0.0, 
            transmission: 0.6, // Glass-like
            opacity: 0.7,
            transparent: true,
            emissive: 0xf1c40f,
            emissiveIntensity: 0.4
        });

        // Helper to spawn
        const spawn = (type) => {
            let mesh;
            if(type === 'bp') mesh = new THREE.Mesh(bpGeo, bpMat.clone());
            else mesh = new THREE.Mesh(lpGeo, lpMat.clone());

            // Random position
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            mesh.position.set(
                BOND_LENGTH * Math.sin(phi) * Math.cos(theta),
                BOND_LENGTH * Math.sin(phi) * Math.sin(theta),
                BOND_LENGTH * Math.cos(phi)
            );

            scene.add(mesh);
            domains.push(mesh);
            domainData.push({ type: type, velocity: new THREE.Vector3() });

            // Bond Stick (Only for BP)
            if(type === 'bp') {
                const bondGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 8);
                bondGeo.rotateX(Math.PI / 2);
                bondGeo.translate(0, 0, 0.5);
                const bond = new THREE.Mesh(bondGeo, new THREE.MeshStandardMaterial({ color: 0x555555 }));
                scene.add(bond);
                bonds.push(bond);
            } else {
                bonds.push(null); // Placeholder to keep indices synced
            }
        };

        for(let i=0; i<numBP; i++) spawn('bp');
        for(let i=0; i<numLP; i++) spawn('lp');
    }

    // --- Physics Engine ---
    function updatePhysics() {
        for (let i = 0; i < domains.length; i++) {
            if (i === draggedIdx) continue; 

            let force = new THREE.Vector3(0, 0, 0);

            for (let j = 0; j < domains.length; j++) {
                if (i === j) continue;

                let dir = new THREE.Vector3().subVectors(domains[i].position, domains[j].position);
                let dist = dir.length();
                if (dist < 0.1) dist = 0.1;

                // Determine Repulsion Strength based on Types
                let typeI = domainData[i].type;
                let typeJ = domainData[j].type;
                let k = FORCE_BP_BP; // Default (BP-BP)

                if (typeI === 'lp' && typeJ === 'lp') k = FORCE_LP_LP; // LP-LP (Max)
                else if (typeI !== typeJ) k = FORCE_BP_LP; // Mixed (Medium)

                let strength = k / (dist * dist);
                dir.normalize().multiplyScalar(strength);
                force.add(dir);
            }

            domainData[i].velocity.add(force);
            domainData[i].velocity.multiplyScalar(DAMPING);
        }

        // Apply
        for (let i = 0; i < domains.length; i++) {
            if (i === draggedIdx) continue;

            domains[i].position.add(domainData[i].velocity);
            domains[i].position.setLength(BOND_LENGTH); // Constrain to shell
        }

        // Visual Updates
        for (let i = 0; i < domains.length; i++) {
            // If BP, update cylinder
            if (domainData[i].type === 'bp' && bonds[i]) {
                bonds[i].position.copy(centralAtom.position);
                bonds[i].lookAt(domains[i].position);
                bonds[i].scale.set(1, 1, domains[i].position.length());
            }

            // Stress Colors (for BP only)
            if (domainData[i].type === 'bp') {
                let minDist = Infinity;
                for (let j = 0; j < domains.length; j++) {
                    if (i === j) continue;
                    let d = domains[i].position.distanceTo(domains[j].position);
                    if (d < minDist) minDist = d;
                }
                
                // Color shift based on stress
                let stress = 0;
                if(minDist < 2.0) stress = 1 - (minDist / 2.0);
                
                const baseColor = new THREE.Color(0x3498db);
                const stressColor = new THREE.Color(0xe74c3c);
                domains[i].material.color.lerpColors(baseColor, stressColor, stress);
            }
        }
    }

    // --- Interaction ---
    let isOrbiting = false;
    let prevMouse = { x: 0, y: 0 };
    let camOrbit = { theta: 0, phi: Math.PI/3, radius: 10 };

    function onMouseDown(e) {
        e.preventDefault();
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(domains);

        if (intersects.length > 0) {
            isDragging = true;
            draggedIdx = domains.indexOf(intersects[0].object);
            dragPlane.position.copy(domains[draggedIdx].position);
            dragPlane.lookAt(camera.position);
        } else {
            isOrbiting = true;
        }
        prevMouse = { x: e.clientX, y: e.clientY };
    }

    function onMouseMove(e) {
        e.preventDefault();
        if (isDragging && draggedIdx !== -1) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(dragPlane);
            if (intersects.length > 0) {
                domains[draggedIdx].position.copy(intersects[0].point).setLength(BOND_LENGTH);
                domainData[draggedIdx].velocity.set(0,0,0);
            }
        }
        if (isOrbiting) {
            const dx = e.clientX - prevMouse.x;
            const dy = e.clientY - prevMouse.y;
            camOrbit.theta -= dx * 0.005;
            camOrbit.phi -= dy * 0.005;
            camOrbit.phi = Math.max(0.1, Math.min(Math.PI - 0.1, camOrbit.phi));
            updateCamera();
        }
        prevMouse = { x: e.clientX, y: e.clientY };
    }

    function onMouseUp() {
        isDragging = false;
        isOrbiting = false;
        draggedIdx = -1;
    }

    function updateCamera() {
        camera.position.x = camOrbit.radius * Math.sin(camOrbit.phi) * Math.sin(camOrbit.theta);
        camera.position.y = camOrbit.radius * Math.cos(camOrbit.phi);
        camera.position.z = camOrbit.radius * Math.sin(camOrbit.phi) * Math.cos(camOrbit.theta);
        camera.lookAt(0,0,0);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        updatePhysics();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
