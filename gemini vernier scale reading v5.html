<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Metrology Simulator</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .app-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 720px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; font-size: 0.9em; margin-bottom: 25px; }
        
        /* The container where the SVG is injected */
        #svg-container { 
            width: 100%; 
            height: 220px; 
            margin-bottom: 20px; 
            background: #fff; 
            border: 1px solid #e1e4e8; 
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        input[type="number"] { padding: 12px; font-size: 1.2em; width: 140px; text-align: center; border: 2px solid #dfe6e9; border-radius: 6px; }
        input:focus { border-color: #0984e3; outline: none; }
        
        button { padding: 12px 25px; font-size: 1em; font-weight: 600; cursor: pointer; border: none; border-radius: 6px; transition: 0.2s; }
        .btn-submit { background: #00b894; color: white; }
        .btn-submit:hover { background: #00a884; }
        .btn-skip { background: #636e72; color: white; }
        .btn-skip:hover { background: #2d3436; }

        .feedback { min-height: 40px; margin-top: 15px; font-weight: bold; font-size: 1.1em; }
        .correct { color: #00b894; }
        .wrong { color: #d63031; }
        .scoreboard { font-size: 1.2em; font-weight: bold; color: #2d3436; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="scoreboard">Score: <span id="score">0</span> / <span id="total">0</span></div>

<div class="app-container">
    <h2 id="tool-name">Loading...</h2>
    <p class="subtitle" id="tool-instruction">...</p>
    
    <div id="svg-container"></div>

    <div class="controls">
        <input type="number" id="userInput" placeholder="Enter mm" step="any">
        <button class="btn-submit" onclick="checkAnswer()">Submit</button>
        <button class="btn-skip" onclick="switchTool()">Switch Tool</button>
    </div>
    
    <div id="feedback" class="feedback"></div>
</div>

<script>
    // --- Global Variables ---
    let currentTool = 'micrometer'; // 'micrometer' or 'caliper'
    let targetValue = 0;
    let score = 0;
    let total = 0;

    // --- Drawing Functions ---

    function render() {
        // Clear previous input
        document.getElementById('userInput').value = '';
        document.getElementById('feedback').innerHTML = '';
        
        if (currentTool === 'micrometer') {
            drawMicrometer();
        } else {
            drawCaliper();
        }
    }

    function drawMicrometer() {
        document.getElementById('tool-name').innerText = "Micrometer (0.01mm)";
        document.getElementById('tool-instruction').innerText = "Read Main Scale (0.5mm steps) + Thimble (0.01mm steps)";
        
        // 1. Generate Random Value (0 to 15mm)
        // We round to 2 decimal places to ensure clean math
        targetValue = (Math.floor(Math.random() * 1500) / 100); 

        // 2. Calculate Graphics
        const PIXELS_PER_MM = 40;
        const OFFSET_X = 50; 
        const thimbleEdge = OFFSET_X + (targetValue * PIXELS_PER_MM);
        
        // 3. Build SVG String
        let svg = `<svg width="700" height="220" viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg">`;
        
        // Define Clip Path (The "Mask" created by the thimble)
        svg += `<defs><clipPath id="maskLeft"><rect x="0" y="0" width="${thimbleEdge}" height="220" /></clipPath></defs>`;

        // MAIN SLEEVE (Static part)
        // We group it and apply the clipPath so parts under the thimble are hidden
        svg += `<g clip-path="url(#maskLeft)">`;
        svg += `<line x1="20" y1="110" x2="680" y2="110" stroke="#333" stroke-width="2"/>`; // Center line
        
        // Draw Ticks (0 to 17mm to be safe)
        for (let m = 0; m <= 34; m++) { // m is half-mm steps
            let val = m / 2;
            let x = OFFSET_X + (val * PIXELS_PER_MM);
            
            if (m % 2 === 0) { // Whole mm (Top)
                svg += `<line x1="${x}" y1="110" x2="${x}" y2="80" stroke="#333" stroke-width="2"/>`;
                svg += `<text x="${x}" y="70" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">${val}</text>`;
            } else { // Half mm (Bottom)
                svg += `<line x1="${x}" y1="110" x2="${x}" y2="135" stroke="#333" stroke-width="2"/>`;
            }
        }
        svg += `</g>`; // End Main Sleeve

        // THIMBLE (Moving part)
        svg += `<g transform="translate(${thimbleEdge}, 0)">`;
        // Thimble Body
        svg += `<rect x="0" y="40" width="150" height="140" fill="#b2bec3" stroke="#636e72" stroke-width="2"/>`;
        svg += `<line x1="0" y1="40" x2="0" y2="180" stroke="#d63031" stroke-width="3"/>`; // Reading Edge (Red)

        // Thimble Ticks logic
        // We need to figure out which number matches the datum line (y=110)
        let decimal = Math.round((targetValue % 0.5) * 100); // 0 to 49
        
        // Draw a window of ticks around the center value
        for (let i = -6; i <= 6; i++) {
            let val = decimal + i;
            // Wrap logic: 49+1 -> 0, 0-1 -> 49
            let displayNum = (val + 50) % 50;
            
            let y = 110 + (i * 12); // Spacing 12px
            
            let len = (displayNum % 5 === 0) ? 25 : 15;
            svg += `<line x1="0" y1="${y}" x2="${len}" y2="${y}" stroke="#333" stroke-width="1"/>`;
            
            if (displayNum % 5 === 0) {
