<!DOCTYPE html>
<html lang="en">
<head>
    <title>Pendulum Wave Lab</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f4f4f4; font-family: 'Segoe UI', sans-serif; display: flex; }
        #sidebar { 
            width: 250px; height: 100vh; background: rgba(255,255,255,0.9); 
            border-right: 1px solid #ddd; overflow-y: auto; padding: 15px; 
            box-sizing: border-box; z-index: 10; font-size: 13px;
        }
        canvas { flex-grow: 1; }
        h3 { margin-top: 0; color: #333; border-bottom: 2px solid #555; }
        .data-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #eee; }
        .label { font-weight: bold; color: #666; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Pendulum Data</h3>
        <div id="stats-list"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "orbit": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js",
                "gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'orbit';
        import { GUI } from 'gui';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf8f8f8);
        const camera = new THREE.PerspectiveCamera(60, (window.innerWidth - 250) / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 20, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 250, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        
        // --- Lighting ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- State ---
        const params = {
            mode: 'Synchronized',
            count: 12,
            baseLength: 10,
            stepValue: 1.2,
            cycleTime: 60,
            amplitude: 0.6,
            decay: 0.0,
            reset: () => { startTime = performance.now(); amplitudes.fill(params.amplitude); }
        };

        let pendulums = [];
        let amplitudes = [];
        let startTime = performance.now();
        const frameGroup = new THREE.Group();
        scene.add(frameGroup);

        function updateSidebar() {
            const list = document.getElementById('stats-list');
            list.innerHTML = '';
            pendulums.forEach((p, i) => {
                const row = document.createElement('div');
                row.className = 'data-row';
                row.innerHTML = `<span class="label">P${i+1}:</span> <span>${p.length.toFixed(2)}m</span>`;
                list.appendChild(row);
            });
        }

        function buildScene() {
            pendulums.forEach(p => scene.remove(p.group));
            frameGroup.clear();
            pendulums = [];
            amplitudes = new Array(params.count).fill(params.amplitude);

            const spacing = 2.0;
            const totalWidth = (params.count - 1) * spacing;
            const g = 9.81;

            // Frame
            const woodMat = new THREE.MeshStandardMaterial({ color: 0x5d4037 });
            const topBar = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, totalWidth + 4), woodMat);
            topBar.position.y = 25;
            topBar.castShadow = true;
            frameGroup.add(topBar);

            const pillar = new THREE.Mesh(new THREE.BoxGeometry(1.5, 25, 1.5), woodMat);
            const pLeft = pillar.clone(); pLeft.position.set(0, 12.5, (totalWidth/2) + 1.5);
            const pRight = pillar.clone(); pRight.position.set(0, 12.5, -(totalWidth/2) - 1.5);
            frameGroup.add(pLeft, pRight);

            // Floor
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
            floor.rotation.x = -Math.PI/2;
            floor.receiveShadow = true;
            scene.add(floor);

            for (let i = 0; i < params.count; i++) {
                let L;
                if (params.mode === 'Synchronized') {
                    // Sweet spot: N oscillations in CycleTime
                    const N = 15 + i; 
                    L = g * Math.pow(params.cycleTime / (2 * Math.PI * N), 2) * 20; // Scale factor
                } else if (params.mode === 'Arithmetic') {
                    L = params.baseLength + (i * params.stepValue);
                } else {
                    L = params.baseLength * Math.pow(params.stepValue, i);
                }

                const group = new THREE.Group();
                const string = new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,-L,0)]),
                    new THREE.LineBasicMaterial({color: 0x999999})
                );
                const ball = new THREE.Mesh(
                    new THREE.SphereGeometry(0.6, 32, 32),
                    new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(i/params.count, 0.6, 0.5), metalness: 0.5 })
                );
                ball.position.y = -L;
                ball.castShadow = true;

                group.add(string, ball);
                group.position.set(0, 25, (i * spacing) - (totalWidth/2));
                scene.add(group);
                pendulums.push({ group, length: L });
            }
            updateSidebar();
        }

        // --- GUI Tweaks ---
        const gui = new GUI();
        gui.add(params, 'mode', ['Synchronized', 'Arithmetic', 'Geometric']).name('Math Logic').onChange(buildScene);
        gui.add(params, 'count', 3, 25, 1).name('Ball Count').onChange(buildScene);
        
        const modeFolder = gui.addFolder('Mode Controls');
        modeFolder.add(params, 'baseLength', 2, 20).name('Start Length').onChange(buildScene);
        modeFolder.add(params, 'stepValue', 0.1, 5).name('Step / Ratio').onChange(buildScene);
        modeFolder.add(params, 'cycleTime', 10, 120).name('Sync Period').onChange(buildScene);

        gui.add(params, 'amplitude', 0.1, 1.5).name('Swing Width');
        gui.add(params, 'decay', 0, 0.005).name('Air Decay');
        gui.add(params, 'reset').name('Restart Animation');

        function animate() {
            requestAnimationFrame(animate);
            const elapsed = (performance.now() - startTime) / 1000;
            const g = 9.81;

            pendulums.forEach((p, i) => {
                amplitudes[i] *= (1 - params.decay);
                // Simple pendulum period formula
                const period = 2 * Math.PI * Math.sqrt(p.length / (g * 5)); // Scaled gravity for visual speed
                p.group.rotation.z = amplitudes[i] * Math.cos((2 * Math.PI * elapsed) / period);
            });

            controls.update();
            renderer.render(scene, camera);
        }

        buildScene();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = (window.innerWidth - 250) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 250, window.innerHeight);
        });
    </script>
</body>
</html>
