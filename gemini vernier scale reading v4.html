<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Precision Metrology Simulator</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #eef2f3; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 700px; text-align: center; }
        h2 { margin: 0 0 10px 0; color: #2c3e50; }
        .instructions { color: #7f8c8d; font-size: 0.9em; margin-bottom: 20px; }
        
        /* The instrument canvas */
        svg { background: #fff; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 20px; user-select: none; }
        
        .controls { display: flex; justify-content: center; gap: 10px; align-items: center; }
        input { padding: 12px; font-size: 18px; width: 120px; text-align: center; border: 2px solid #bdc3c7; border-radius: 6px; }
        input:focus { border-color: #3498db; outline: none; }
        
        button { padding: 12px 24px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; border-radius: 6px; transition: 0.2s; }
        .btn-check { background: #2ecc71; color: white; }
        .btn-check:hover { background: #27ae60; }
        .btn-skip { background: #95a5a6; color: white; }
        .btn-skip:hover { background: #7f8c8d; }
        
        .feedback-area { height: 40px; margin-top: 15px; font-weight: bold; font-size: 1.1em; }
        .correct { color: #27ae60; }
        .wrong { color: #c0392b; }
        
        .scoreboard { position: absolute; top: 20px; right: 20px; background: #34495e; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="scoreboard">Score: <span id="score">0</span></div>

<div class="container">
    <h2 id="tool-title">Metric Micrometer (0.01mm)</h2>
    <p class="instructions" id="tool-desc">Read the main scale (0.5mm pitch) + Thimble (0.01mm).</p>
    
    <svg id="canvas" width="600" height="220" viewBox="0 0 600 220"></svg>

    <div class="controls">
        <input type="number" id="user-input" placeholder="0.00" step="any">
        <button class="btn-check" onclick="checkAnswer()">Submit Reading</button>
        <button class="btn-skip" onclick="switchMode()">Switch Tool / Next</button>
    </div>
    
    <div class="feedback-area" id="feedback"></div>
</div>
