<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenhouse Gas Absorption Models</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e1e;
            color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-top: 0; }
        .container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1000px;
        }
        .panel {
            flex: 1;
            background: #2d2d2d;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            background: #111;
            border-radius: 4px;
            border: 1px solid #444;
            margin-top: 10px;
        }
        .controls {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 960px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        label { font-weight: bold; font-size: 1.1em; }
        input[type=range] { width: 300px; cursor: pointer; }
        .status { margin-top: 10px; font-weight: bold; min-height: 20px; }
        .matched { color: #4CAF50; }
        .unmatched { color: #F44336; }
    </style>
</head>
<body>

    <h1>Greenhouse Effect Mechanisms</h1>
    
    <div class="container">
        <div class="panel">
            <h2>Resonance Model</h2>
            <p>Molecule vibrates if frequency matches.</p>
            <canvas id="resonanceCanvas" width="450" height="300"></canvas>
            <div id="resStatus" class="status"></div>
        </div>

        <div class="panel">
            <h2>Energy Level Model</h2>
            <p>State elevates if $hf = \Delta E$.</p>
            <canvas id="energyCanvas" width="450" height="300"></canvas>
            <div id="engStatus" class="status"></div>
        </div>
    </div>

    <div class="controls">
        <label for="freqSlider">Incoming IR Photon Frequency / Energy:</label>
        <input type="range" id="freqSlider" min="10" max="90" value="30">
        <span id="freqValue">30</span>
        <button onclick="firePhoton()" style="padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold;">Fire Photon</button>
    </div>

    <script>
        // Constants & Targets
        const targetFrequency = 50; // The absorption frequency/energy gap
        const tolerance = 2; // Tolerance for matching

        // State variables
        let incomingFreq = 30;
        let photons = [];
        let moleculeState = 'ground'; // 'ground', 'excited'
        let excitationTimer = 0;

        // Dom elements
        const freqSlider = document.getElementById('freqSlider');
        const freqValue = document.getElementById('freqValue');
        const resCanvas = document.getElementById('resonanceCanvas');
        const engCanvas = document.getElementById('energyCanvas');
        const resCtx = resCanvas.getContext('2d');
        const engCtx = engCanvas.getContext('2d');
        const resStatus = document.getElementById('resStatus');
        const engStatus = document.getElementById('engStatus');

        // Update slider value
        freqSlider.addEventListener('input', (e) => {
            incomingFreq = parseInt(e.target.value);
            freqValue.textContent = incomingFreq;
            checkMatchUI();
        });

        function checkMatchUI() {
            const isMatch = Math.abs(incomingFreq - targetFrequency) <= tolerance;
            const text = isMatch ? "MATCH: Absorption will occur" : "NO MATCH: Photon will pass through";
            const className = isMatch ? "status matched" : "status unmatched";
            
            resStatus.textContent = text;
            resStatus.className = className;
            engStatus.textContent = text;
            engStatus.className = className;
        }

        function firePhoton() {
            // Only fire if molecule is in ground state and no incoming photon exists
            if (moleculeState === 'ground' && photons.length === 0) {
                photons.push({
                    x: 0,
                    y: 150,
                    vx: 3,
                    vy: 0,
                    freq: incomingFreq,
                    active: true
                });
            }
        }

        // Animation Loop
        let frame = 0;
        function animate() {
            frame++;
            resCtx.clearRect(0, 0, resCanvas.width, resCanvas.height);
            engCtx.clearRect(0, 0, engCanvas.width, engCanvas.height);

            updatePhysics();
            drawResonanceModel();
            drawEnergyModel();

            requestAnimationFrame(animate);
        }

        function updatePhysics() {
            // Handle excitation timer
            if (moleculeState === 'excited') {
                excitationTimer--;
                if (excitationTimer <= 0) {
                    moleculeState = 'ground';
                    // Emit photon in random direction
                    const angle = Math.random() * Math.PI * 2;
                    photons.push({
                        x: 225,
                        y: 150,
                        vx: 3 * Math.cos(angle),
                        vy: 3 * Math.sin(angle),
                        freq: targetFrequency, // Emits at the target frequency
                        active: true
                    });
                }
            }

            // Update photons
            for (let i = photons.length - 1; i >= 0; i--) {
                let p = photons[i];
                p.x += p.vx;
                p.y += p.vy;

                // Check collision with center molecule (x=225)
                if (p.active && moleculeState === 'ground' && p.x > 215 && p.x < 235 && p.y > 140 && p.y < 160) {
                    if (Math.abs(p.freq - targetFrequency) <= tolerance) {
                        // Absorption!
                        p.active = false;
                        photons.splice(i, 1);
                        moleculeState = 'excited';
                        excitationTimer = 100; // Time spent in excited state
                        continue;
                    }
                }

                // Remove off-screen photons
                if (p.x > 450 || p.x < 0 || p.y > 300 || p.y < 0) {
                    photons.splice(i, 1);
                }
            }
        }

        function drawPhoton(ctx, p) {
            ctx.beginPath();
            // Draw a squiggly line for the photon
            ctx.moveTo(p.x - 15, p.y);
            for(let i=0; i<15; i++) {
                ctx.lineTo((p.x - 15) + i, p.y + Math.sin(frame * 0.2 + i * 0.5) * 5);
            }
            ctx.strokeStyle = `hsl(${250 - p.freq*2}, 100%, 60%)`;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Leading point
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
            ctx.fillStyle = ctx.strokeStyle;
            ctx.fill();
        }

        function drawResonanceModel() {
            const centerX = 225;
            const centerY = 150;
            
            // Draw molecule (Central atom and two outer atoms)
            let offset = 0;
            if (moleculeState === 'excited') {
                // Vibrate violently
                offset = Math.sin(frame * 0.5) * 10;
            } else {
                // Vibrate slightly due to ambient temp
                offset = Math.sin(frame * 0.05) * 2;
            }

            // Springs
            resCtx.beginPath();
            resCtx.moveTo(centerX - 40 - offset, centerY);
            resCtx.lineTo(centerX + 40 + offset, centerY);
            resCtx.strokeStyle = '#888';
            resCtx.lineWidth = 3;
            resCtx.stroke();

            // Atoms
            resCtx.fillStyle = '#f44336'; // Oxygen
            resCtx.beginPath(); resCtx.arc(centerX - 40 - offset, centerY, 15, 0, Math.PI*2); resCtx.fill();
            resCtx.beginPath(); resCtx.arc(centerX + 40 + offset, centerY, 15, 0, Math.PI*2); resCtx.fill();
            
            resCtx.fillStyle = '#555'; // Carbon
            resCtx.beginPath(); resCtx.arc(centerX, centerY, 20, 0, Math.PI*2); resCtx.fill();

            // Photons
            photons.forEach(p => drawPhoton(resCtx, p));
        }

        function drawEnergyModel() {
            // Draw Energy Levels
            engCtx.strokeStyle = '#fff';
            engCtx.lineWidth = 2;
            
            // E2 (Excited)
            engCtx.beginPath();
            engCtx.moveTo(100, 80);
            engCtx.lineTo(350, 80);
            engCtx.stroke();
            engCtx.fillStyle = '#aaa';
            engCtx.fillText("E2 (Excited State)", 360, 85);

            // E1 (Ground)
            engCtx.beginPath();
            engCtx.moveTo(100, 220);
            engCtx.lineTo(350, 220);
            engCtx.stroke();
            engCtx.fillText("E1 (Ground State)", 360, 225);

            // Energy gap indicator
            engCtx.beginPath();
            engCtx.setLineDash([5, 5]);
            engCtx.moveTo(150, 80);
            engCtx.lineTo(150, 220);
            engCtx.stroke();
            engCtx.setLineDash([]);
            engCtx.fillText("ΔE", 125, 155);

            // The state/electron
            const stateY = moleculeState === 'excited' ? 80 : 220;
            engCtx.fillStyle = '#4CAF50';
            engCtx.beginPath();
            engCtx.arc(225, stateY, 10, 0, Math.PI*2);
            engCtx.fill();
            engCtx.strokeStyle = '#fff';
            engCtx.stroke();

            // Photons
            photons.forEach(p => drawPhoton(engCtx, p));
        }

        // Initialize
        checkMatchUI();
        animate();
    </script>
</body>
</html>
