<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Topic 1 Quiz — Forces and motion</title>
<style>
:root{
  --bg:#070b16;
  --ink:#eef2ff;
  --muted:#a8b3d6;
  --line:rgba(255,255,255,.10);
  --good:#21c07a;
  --bad:#ff5a6a;
  --warn:#ffcc66;
  --accent:#3b6cff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  background: radial-gradient(1200px 900px at 15% -10%, #14224a 0%, rgba(20,34,74,0) 50%),
              radial-gradient(1200px 900px at 95% 0%, #1a2a58 0%, rgba(26,42,88,0) 45%),
              var(--bg);
  color:var(--ink);
}
.topbar{
  display:flex; justify-content:space-between; align-items:center; gap:12px;
  padding:16px 18px;
  max-width:1200px; margin:0 auto;
}
.brandTitle{font-weight:900; font-size:18px}
.brandSub{color:var(--muted); font-size:12px; margin-top:2px}
.wrap{max-width:1200px; margin:0 auto; padding:0 18px 26px; display:grid; gap:14px}
.panel{
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
}
.panelTop{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:12px}
.panelTitle{font-weight:900; font-size:15px}
.panelMeta{display:flex; gap:8px; flex-wrap:wrap}
.pill{
  display:inline-flex; align-items:center;
  padding:6px 10px; border-radius:999px;
  border:1px solid var(--line);
  color:var(--muted);
  font-size:12px;
  background: rgba(255,255,255,.02);
}
.btn{
  appearance:none;
  border:1px solid var(--line);
  background: rgba(255,255,255,.04);
  color:var(--ink);
  padding:10px 12px;
  border-radius:12px;
  cursor:pointer;
  font-weight:700;
}
.btn:hover{border-color:rgba(255,255,255,.22)}
.btn.primary{
  background: linear-gradient(180deg, rgba(59,108,255,.18), rgba(59,108,255,.10));
  border-color: rgba(59,108,255,.45);
}
.btn:disabled{opacity:.45; cursor:not-allowed}
.controls{
  display:grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap:12px;
}
@media (max-width: 980px){
  .controls{grid-template-columns:1fr}
}
.control label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px}
.control input, .control select{
  width:100%;
  background: rgba(255,255,255,.03);
  border:1px solid var(--line);
  color:var(--ink);
  padding:10px 10px;
  border-radius:12px;
  outline:none;
}
.control.wide{grid-column: 1 / -1}
.control.actions{display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap}
.topicGrid{
  display:grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap:8px;
}
@media (max-width: 980px){ .topicGrid{grid-template-columns:1fr} }
.topic{
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
  background: rgba(255,255,255,.02);
  font-size:13px;
  color: var(--ink);
  display:flex;
  gap:10px;
  align-items:flex-start;
}
.topic input{margin-top:2px}
.hint{color:var(--muted); font-size:12px; margin-top:6px}
.kpis{display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-top:6px}
.kpi{border:1px solid var(--line); border-radius:14px; padding:10px; background: rgba(255,255,255,.02)}
.kpiN{font-weight:900; font-size:18px}
.kpiL{color:var(--muted); font-size:12px; margin-top:3px}
.scoreLine{margin-top:10px; font-weight:900}
.qcard{
  margin-top:12px;
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
}
.qhead{display:flex; justify-content:space-between; gap:12px; align-items:flex-start}
.qnum{font-size:12px; color:var(--muted); margin-bottom:8px}
.qtext{font-size:15px; font-weight:800}
.tags{display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end}
.tag{
  font-size:11px;
  border:1px solid var(--line);
  padding:4px 8px;
  border-radius:999px;
  color:var(--muted);
  background: rgba(255,255,255,.02);
}
.choice{
  display:flex; gap:10px; align-items:flex-start;
  padding:10px 10px; border-radius:12px;
  border:1px solid var(--line);
  margin-top:8px; background: rgba(255,255,255,.02);
  cursor:pointer;
}
.choice:hover{border-color: rgba(255,255,255,.22)}
.choice input{margin-top:2px}
.choiceViz{margin-top:8px;border:1px solid rgba(255,255,255,.10);border-radius:12px;padding:8px;background:rgba(255,255,255,.015);display:inline-block}
.choiceViz svg{display:block}
.answerbox{display:flex; gap:10px; margin-top:10px}
.answerbox input{flex:1}
.feedback{
  margin-top:12px;
  border:1px dashed rgba(255,255,255,.20);
  border-radius:14px;
  padding:12px;
  background: rgba(255,255,255,.02);
}
.feedback.good{border-color: rgba(33,192,122,.55); background: rgba(33,192,122,.07)}
.feedback.bad{border-color: rgba(255,90,106,.55); background: rgba(255,90,106,.06)}
.feedback .title{font-weight:900; margin-bottom:8px}
.explain{margin:0 0 10px; font-size:13px}
details summary{cursor:pointer; color:var(--muted); font-weight:900; margin-top:6px}
details .model{
  margin:10px 0 0;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
  font-size:12.5px;
  color:#dbe2ff;
  white-space:pre-wrap;
  line-height:1.4;
}
.autoWarn{
  border:1px solid rgba(255,204,102,.55);
  background: rgba(255,204,102,.10);
  padding:10px;
  border-radius:14px;
  margin-top:10px;
}
.autoWarn .h{font-weight:1000; color:#ffe6b3; margin-bottom:6px}
.autoWarn .b{color:#ffecc7; font-size:12.5px; line-height:1.35}
.selfMarkRow{display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap}
.selfMarkRow input{
  width:110px;
  background: rgba(255,255,255,.03);
  border:1px solid rgba(255,204,102,.45);
  color:var(--ink);
  padding:8px 10px;
  border-radius:12px;
  outline:none;
}
.selfMarkRow .note{color:var(--muted); font-size:12px}
.small{font-size:12px; color:var(--muted)}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <div class="brandTitle">Topic 1 Quiz</div>
    <div class="brandSub">Forces and motion • random sets • mark-scheme style feedback</div>
  </div>
  <div class="panelMeta">
    <span class="pill" id="statusPill">Idle</span>
    <span class="pill">Tip: press Enter to submit</span>
  </div>
</header>

<main class="wrap">
  <section class="panel">
    <div class="panelTop">
      <div class="panelTitle">Controls</div>
      <div class="panelMeta">
        <span class="pill" id="setPill">No set</span>
      </div>
    </div>

    <div class="controls">
      <div class="control">
        <label for="numQ">Questions per set</label>
        <input id="numQ" type="number" min="5" max="35" value="12" />
      </div>
      <div class="control">
        <label for="diffMix">Difficulty mix</label>
        <select id="diffMix">
          <option value="all" selected>Mixed</option>
          <option value="easy">Mostly easier</option>
          <option value="med">Mostly medium</option>
          <option value="hard">Harder</option>
        </select>
      </div>
      <div class="control wide">
        <label>Topics to include</label>
        <div class="topicGrid">
          <label class="topic"><input class="topicCb" type="checkbox" value="units" checked /> Units & symbols</label>
          <label class="topic"><input class="topicCb" type="checkbox" value="d_t" checked /> Distance–time graphs</label>
          <label class="topic"><input class="topicCb" type="checkbox" value="speed" checked /> Average speed</label>
          <label class="topic"><input class="topicCb" type="checkbox" value="practical" checked /> Practical planning</label>
          <label class="topic"><input class="topicCb" type="checkbox" value="accel" checked /> Acceleration (a=(v−u)/t)</label>
          <label class="topic"><input class="topicCb" type="checkbox" value="v_t" checked /> Velocity–time graphs (gradients/areas)</label>
          <label class="topic"><input class="topicCb" type="checkbox" value="forces" checked /> Types/effects of forces</label>
          <label class="topic"><input class="topicCb" type="checkbox" value="fma" checked /> F = ma</label>
          <label class="topic"><input class="topicCb" type="checkbox" value="wmg" checked /> W = mg</label>
          <label class="topic"><input class="topicCb" type="checkbox" value="stopping" checked /> Stopping distance</label>
        </div>
      </div>

      <div class="control actions">
        <button class="btn primary" id="startBtn">Start set</button>
        <button class="btn" id="newSetBtn" disabled>New random set</button>
        <button class="btn" id="revealAllBtn" disabled>Reveal mark scheme</button>
      </div>

      <div class="control wide">
        <div class="kpis">
          <div class="kpi"><div class="kpiN" id="kpiChecked">0</div><div class="kpiL">checked</div></div>
          <div class="kpi"><div class="kpiN" id="kpiFull">0</div><div class="kpiL">full</div></div>
          <div class="kpi"><div class="kpiN" id="kpiPartial">0</div><div class="kpiL">partial</div></div>
          <div class="kpi"><div class="kpiN" id="kpiWrong">0</div><div class="kpiL">wrong</div></div>
        </div>
        <div class="scoreLine" id="scoreLine">-</div>
        <div class="hint" id="summaryLine">Start a set to begin.</div>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="panelTop">
      <div class="panelTitle">Questions</div>
      <div class="panelMeta">
        <span class="pill">Auto-mark long answers = keyword check only</span>
      </div>
    </div>
    <div id="quiz"></div>
  </section>
</main>

<script>
const els = {
  statusPill: document.getElementById("statusPill"),
  setPill: document.getElementById("setPill"),
  numQ: document.getElementById("numQ"),
  diffMix: document.getElementById("diffMix"),
  startBtn: document.getElementById("startBtn"),
  newSetBtn: document.getElementById("newSetBtn"),
  revealAllBtn: document.getElementById("revealAllBtn"),
  quiz: document.getElementById("quiz"),
  scoreLine: document.getElementById("scoreLine"),
  summaryLine: document.getElementById("summaryLine"),
  kpiChecked: document.getElementById("kpiChecked"),
  kpiFull: document.getElementById("kpiFull"),
  kpiPartial: document.getElementById("kpiPartial"),
  kpiWrong: document.getElementById("kpiWrong"),
};

function escapeHtml(s){
  return (s ?? "").toString()
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#39;");
}
function norm(s){
  return (s ?? "")
    .toString()
    .trim()
    .toLowerCase()
    .replace(/[“”"]/g,'"')
    .replace(/[’]/g,"'")
    .replace(/\s+/g,' ');
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function clamp(n,min,max){ return Math.max(min, Math.min(max,n)); }

function svgAxes(labelX, labelY){
  return `
    <line x1="32" y1="12" x2="32" y2="138" stroke="rgba(255,255,255,.35)"/>
    <line x1="32" y1="138" x2="210" y2="138" stroke="rgba(255,255,255,.35)"/>
    <text x="10" y="22" fill="rgba(255,255,255,.65)" font-size="11">${labelY}</text>
    <text x="195" y="160" fill="rgba(255,255,255,.65)" font-size="11">${labelX}</text>
  `;
}
function graphChoiceHTML(title, svgPath, labelX, labelY, caption){
  return `
    <div class="choiceText">
      <div class="choiceTitle">${title}</div>
      <div class="choiceViz">
        <svg viewBox="0 0 240 170" width="220" height="150" aria-label="${title}">
          ${svgAxes(labelX,labelY)}
          ${svgPath}
        </svg>
      </div>
      ${caption ? `<div class="small">${caption}</div>` : ``}
    </div>
  `;
}
function gStationary(){ return `<line x1="32" y1="88" x2="205" y2="88" stroke="rgba(255,255,255,.85)" stroke-width="3"/>`; }
function gConstUp(){ return `<line x1="32" y1="138" x2="205" y2="35" stroke="rgba(255,255,255,.85)" stroke-width="3"/>`; }
function gConstDown(){ return `<line x1="32" y1="35" x2="205" y2="138" stroke="rgba(255,255,255,.85)" stroke-width="3"/>`; }
function gCurveUp(){
  // Distance–time accelerating: starts shallow then gets much steeper (concave up)
  return `<path d="M32 138 C 80 138, 140 138, 205 35" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="3"/>`;
}
function gCurveDown(){
  // Distance–time decelerating: starts steep then flattens (concave down)
  return `<path d="M32 138 C 80 35, 140 35, 205 35" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="3"/>`;
}
function gVtConst(){ return `<line x1="32" y1="65" x2="205" y2="65" stroke="rgba(255,255,255,.85)" stroke-width="3"/>`; }
function gVtAccel(){ return `<line x1="32" y1="125" x2="205" y2="45" stroke="rgba(255,255,255,.85)" stroke-width="3"/>`; }
function gVtDecel(){ return `<line x1="32" y1="45" x2="205" y2="125" stroke="rgba(255,255,255,.85)" stroke-width="3"/>`; }
function gVtCurveUp(){ return `<path d="M32 125 C 85 120, 125 95, 205 45" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="3"/>`; }

// Numeric parsing
function numParts(raw){
  if(raw === null || raw === undefined) return {ok:false};
  let s = raw.toString().trim();
  if(!s) return {ok:false};
  s = s.replace(/×/g,'x');
  let compact = s.replace(/\s+/g,'');
  compact = compact.replace(/x10\^?\(?(-?\d+)\)?/i, 'e$1');
  compact = compact.replace(/10\^\(?(-?\d+)\)?/i, 'e$1');
  const m = compact.match(/[-+]?\d*\.?\d+(?:e[-+]?\d+)?/i);
  if(!m) return {ok:false};
  const num = Number(m[0]);
  if(Number.isNaN(num)) return {ok:false};
  return {ok:true, num, numStr:m[0]};
}
function tidyUnitToken(u){
  if(!u) return null;
  let t = u.trim();
  if(!t) return null;
  t = t.replace(/²/g,'^2').replace(/³/g,'^3');
  t = t.replace(/\s+/g,'');
  t = t.replace(/mps\^?2/ig,'m/s^2');
  t = t.replace(/m\/s\^?2/ig,'m/s^2');
  t = t.replace(/m\/s2/ig,'m/s^2');
  t = t.replace(/mps/ig,'m/s');
  t = t.replace(/m\/s/ig,'m/s');
  t = t.replace(/n\/kg/ig,'N/kg');
  return t;
}
function unitInfo(token){
  if(!token) return null;
  const t = tidyUnitToken(token);
  const exact = token.trim();
  if(t === "kg") return {type:"mass", canonical:"kg", caseOk:(exact==="kg")};
  if(t === "m") return {type:"length", canonical:"m", caseOk:(exact==="m")};
  if(t === "s") return {type:"time", canonical:"s", caseOk:(exact==="s")};
  if(t === "N") return {type:"force", canonical:"N", caseOk:(exact==="N")};
  if(t === "m/s") return {type:"speed", canonical:"m/s", caseOk:(exact==="m/s")};
  if(t === "m/s^2" || t === "m/s2") return {type:"accel", canonical:"m/s^2", caseOk:(exact==="m/s^2" || exact==="m/s²" || exact==="m/s2")};
  if(t === "N/kg") return {type:"g", canonical:"N/kg", caseOk:(exact==="N/kg")};
  return null;
}
function parseQuantity(raw){
  const parts = numParts(raw);
  if(!parts.ok) return {ok:false};
  const rawStr = raw.toString().trim();
  const m = rawStr.match(/[-+]?\d*\.?\d+(?:\s*(?:e|E|x\s*10\^?)\s*[-+]?\d+)?/);
  let suffix = "";
  if(m){ suffix = rawStr.slice(rawStr.indexOf(m[0]) + m[0].length).trim(); }
  const token = tidyUnitToken(suffix);
  const unitPresent = !!token;
  const info = unitPresent ? unitInfo(token) : null;
  return {
    ok:true,
    num: parts.num,
    numStr: (m ? m[0].replace(/\s+/g,'') : parts.numStr),
    unitToken: unitPresent ? token : null,
    unitType: info ? info.type : null,
    unitCanonical: info ? info.canonical : null,
    unitCaseOk: info ? (info.caseOk !== false) : null,
    unitPresent
  };
}
function countDecimalPlaces(numStr){
  const s = numStr.toLowerCase();
  const base = s.split('e')[0];
  const dot = base.indexOf('.');
  return (dot === -1) ? 0 : (base.length - dot - 1);
}
function countSigFigs(numStr){
  let s = numStr.toLowerCase();
  s = s.replace(/^[-+]/,'');
  s = s.split('e')[0];
  if(s.includes('.')){
    s = s.replace(/^0+/, '').replace('.','').replace(/^0+/, '');
    return Math.max(1, s.length);
  } else {
    s = s.replace(/^0+/, '').replace(/0+$/,'');
    return Math.max(1, s.length || 1);
  }
}
function roundToDp(x, dp){
  const f = Math.pow(10, dp);
  return Math.round((x + Number.EPSILON) * f) / f;
}
function roundToSf(x, sf){
  if(x === 0) return 0;
  return Number(x.toPrecision(sf));
}
function nearlyEqual(a,b, rel=1e-4, abs=1e-9){
  const diff = Math.abs(a-b);
  if(diff <= abs) return true;
  const scale = Math.max(Math.abs(a), Math.abs(b), 1e-12);
  return diff/scale <= rel;
}
function roundingMatch(studentVal, trueVal, numStr){
  if(nearlyEqual(studentVal, trueVal)) return {ok:true, basis:"exact"};
  const dp = countDecimalPlaces(numStr);
  const sf = countSigFigs(numStr);
  const tDp = roundToDp(trueVal, dp);
  if(nearlyEqual(studentVal, tDp, 1e-10, 1e-12)) return {ok:true, basis:`${dp} d.p.`};
  const tSf = roundToSf(trueVal, sf);
  if(nearlyEqual(studentVal, tSf, 1e-10, 1e-12)) return {ok:true, basis:`${sf} s.f.`};
  return {ok:false};
}
function closeButBadRounding(studentVal, trueVal, numStr, relTolClose){
  const diff = Math.abs(studentVal-trueVal);
  const scale = Math.max(Math.abs(trueVal), 1e-12);
  const rel = diff/scale;
  const close = rel <= (relTolClose ?? 0.03);
  if(!close) return null;
  const dp = countDecimalPlaces(numStr);
  const sf = countSigFigs(numStr);
  const base = numStr.toLowerCase().split('e')[0];
  const hasDot = base.includes('.');
  const target = hasDot ? roundToDp(trueVal, dp) : roundToSf(trueVal, sf);
  let hint = "";
  if(target > studentVal) hint = "You needed to round up.";
  if(target < studentVal) hint = "You needed to round down.";
  return {basis: hasDot ? `${dp} d.p.` : `${sf} s.f.`, target, hint, dp: hasDot ? dp : null, sf: hasDot ? null : sf};
}
function fmtRounded(value, opts){
  if(opts && Number.isInteger(opts.dp)) return Number(value).toFixed(opts.dp);
  if(opts && Number.isInteger(opts.sf)) return Number(value).toPrecision(opts.sf);
  const a = Number(value);
  return (Math.abs(a) >= 1000 || Math.abs(a) < 0.01) ? a.toExponential(3) : a.toPrecision(4);
}

function rchoice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function genSpeedBasic(){
  const distances = [40, 60, 75, 90, 120, 150, 200];
  const times = [5, 6, 8, 10, 12, 15, 20];
  const d = rchoice(distances);
  const t = rchoice(times);
  const v = d/t;
  return {
    prompt: `A runner travels ${d} m in ${t} s. Calculate the average speed.`,
    answer: v,
    unitHint: "m/s",
    explanation:
`Mark scheme:
Use average speed = distance / time.
v = ${d} / ${t} = ${v.toPrecision(4)} m/s.`
  };
}
function genSpeedConvertKmh(){
  const kmh = rchoice([18, 27, 36, 45, 54, 72, 90]);
  const ms = kmh * (1000/3600);
  return {
    prompt: `Convert ${kmh} km/h to m/s.`,
    answer: ms,
    unitHint: "m/s",
    explanation:
`Mark scheme:
1 km/h = (1000 m)/(3600 s) = 0.277... m/s.
So ${kmh} km/h = ${kmh} × 1000/3600 = ${ms.toPrecision(4)} m/s.`
  };
}
function genAccelFromUVT(){
  const u = rchoice([0, 2, 3, 4, 5, 6, 8, 10]);
  const a = rchoice([0.5, 0.8, 1.2, 1.5, 2.0, -1.0, -1.5]);
  const t = rchoice([2, 3, 4, 5, 6, 8]);
  const v = u + a*t;
  return {
    prompt: `A car changes speed from ${u} m/s to ${v.toFixed(1)} m/s in ${t} s. Calculate the acceleration.`,
    answer: (v - u)/t,
    unitHint: "m/s^2",
    explanation:
`Mark scheme:
Use a = (v − u)/t.
a = (${v.toFixed(1)} − ${u}) / ${t} = ${((v-u)/t).toPrecision(4)} m/s².

Sign matters: deceleration gives a negative value.`
  };
}
function genFmaSolveF(){
  const m = rchoice([0.5, 0.8, 1.2, 1.5, 2.0, 3.0, 4.0]);
  const a = rchoice([0.6, 1.0, 1.4, 2.2, 3.0, -1.5]);
  const F = m*a;
  return {
    prompt: `A trolley of mass ${m} kg has acceleration ${a} m/s². Calculate the resultant force.`,
    answer: F,
    unitHint: "N",
    explanation:
`Mark scheme:
Use F = ma.
F = ${m} × ${a} = ${F.toPrecision(4)} N.`
  };
}
function genFmaSolveA(){
  const m = rchoice([0.75, 1.2, 1.5, 2.5, 3.0, 4.0]);
  const F = rchoice([3, 4.5, 6, 8, 10, 12]);
  const a = F/m;
  return {
    prompt: `A resultant force of ${F} N acts on a mass of ${m} kg. Calculate the acceleration.`,
    answer: a,
    unitHint: "m/s^2",
    explanation:
`Mark scheme:
Use F = ma so a = F/m.
a = ${F} / ${m} = ${a.toPrecision(4)} m/s².`
  };
}
function genWmgSolveW(){
  const m = rchoice([0.20, 0.35, 0.50, 0.80, 1.2, 2.0, 3.5]);
  const g = rchoice([9.8, 10]);
  const W = m*g;
  return {
    prompt: `An object has mass ${m} kg. Take g = ${g} N/kg. Calculate its weight.`,
    answer: W,
    unitHint: "N",
    explanation:
`Mark scheme:
Use W = mg.
W = ${m} × ${g} = ${W.toPrecision(4)} N.`
  };
}
function genWmgSolveM(){
  const g = rchoice([9.8, 10]);
  const W = rchoice([4.9, 9.8, 14.7, 19.6, 24.5, 30.0, 50.0]);
  const m = W/g;
  return {
    prompt: `A suitcase has weight ${W} N on Earth. Take g = ${g} N/kg. Calculate its mass.`,
    answer: m,
    unitHint: "kg",
    explanation:
`Mark scheme:
Use W = mg so m = W/g.
m = ${W} / ${g} = ${m.toPrecision(4)} kg.`
  };
}
function genGradientSpeedFromDT(){
  const t2 = rchoice([4,5,6,8,10,12]);
  const v = rchoice([1.5, 2.0, 2.5, 3.0, 4.0]);
  const d2 = v*t2;
  return {
    prompt: `A distance–time graph is a straight line from (0 s, 0 m) to (${t2} s, ${d2} m). Calculate the speed (gradient).`,
    answer: v,
    unitHint: "m/s",
    explanation:
`Mark scheme:
Speed = gradient = Δdistance/Δtime.
v = ${d2} / ${t2} = ${v.toPrecision(4)} m/s.`
  };
}
function genVtGradientAccel(){
  const t2 = rchoice([3,4,5,6,8,10]);
  const u = rchoice([0,2,4,6,8,10]);
  const a = rchoice([0.5, 1.0, 1.5, 2.0, -1.0, -1.5]);
  const v = u + a*t2;
  return {
    prompt: `A velocity–time graph is a straight line from (0 s, ${u} m/s) to (${t2} s, ${v.toFixed(1)} m/s). Calculate the acceleration (gradient).`,
    answer: (v-u)/t2,
    unitHint: "m/s^2",
    explanation:
`Mark scheme:
Acceleration = gradient = (v − u)/t.
a = (${v.toFixed(1)} − ${u}) / ${t2} = ${((v-u)/t2).toPrecision(4)} m/s².`
  };
}
function genVtAreaDistance(){
  const v0 = rchoice([12, 14, 16, 18, 20]);
  const tThink = rchoice([0.6, 0.8, 1.0, 1.2, 1.5]);
  const tBrake = rchoice([2.0, 2.5, 3.0, 3.5, 4.0]);
  const thinking = v0 * tThink;
  const braking = 0.5 * v0 * tBrake;
  const stop = thinking + braking;
  const which = rchoice(["thinking", "braking", "stopping"]);
  if(which === "thinking"){
    return {
      prompt: `A car travels at ${v0} m/s for a reaction time of ${tThink} s before braking. Use the v–t area method to find the thinking distance.`,
      answer: thinking,
      unitHint: "m",
      explanation:
`Mark scheme:
Thinking distance is the rectangle area under the v–t graph:
d = v × t = ${v0} × ${tThink} = ${thinking.toPrecision(4)} m.`
    };
  }
  if(which === "braking"){
    return {
      prompt: `A car brakes from ${v0} m/s to 0 in ${tBrake} s. Use the v–t area method to find the braking distance.`,
      answer: braking,
      unitHint: "m",
      explanation:
`Mark scheme:
Braking distance is the triangle area:
d = 1/2 × base × height = 1/2 × ${tBrake} × ${v0} = ${braking.toPrecision(4)} m.`
    };
  }
  return {
    prompt: `A car travels at ${v0} m/s for ${tThink} s before braking to rest in ${tBrake} s. Use the v–t area method to find the stopping distance.`,
    answer: stop,
    unitHint: "m",
    explanation:
`Mark scheme:
Stopping distance = thinking + braking.
Thinking: ${thinking.toPrecision(4)} m.
Braking: ${braking.toPrecision(4)} m.
Total = ${stop.toPrecision(4)} m.`
  };
}

function getSelectedTopics(){
  return Array.from(document.querySelectorAll(".topicCb")).filter(cb=>cb.checked).map(cb=>cb.value);
}
function applyDifficultyFilter(list, mix){
  if(mix === "all") return list;
  if(mix === "easy") return list.filter(q => q.difficulty==="easy" || q.difficulty==="med");
  if(mix === "med") return list.filter(q => q.difficulty!=="easy");
  if(mix === "hard") return list.filter(q => q.difficulty==="hard");
  return list;
}
function buildPool(){
  const topics = getSelectedTopics();
  let pool = BANK.filter(q => q.tags.some(t => topics.includes(t)));
  pool = applyDifficultyFilter(pool, els.diffMix.value);
  return pool;
}
function expandQuestion(q){
  if(typeof q.generator === "function"){
    const inst = q.generator();
    return {...q, ...inst};
  }
  return {...q};
}
function qMaxMarks(q){
  if(Number.isFinite(q.marks)) return q.marks;
  if(Array.isArray(q.markPoints)) return q.markPoints.length;
  return 1;
}

let currentSet = [];
let answered = new Map();

function totalMaxMarks(){
  return currentSet.reduce((s,q)=> s + qMaxMarks(q), 0);
}
function totalScore(){
  let s=0;
  for(const v of answered.values()){
    if(v.checked) s += (v.score ?? 0);
  }
  return s;
}
function renderKPIs(){
  const vals = Array.from(answered.values());
  const checked = vals.filter(x => x.checked).length;
  const full = vals.filter(x => x.checked && x.status==="full").length;
  const partial = vals.filter(x => x.checked && x.status==="partial").length;
  const wrong = vals.filter(x => x.checked && x.status==="wrong").length;

  els.kpiChecked.textContent = checked;
  els.kpiFull.textContent = full;
  els.kpiPartial.textContent = partial;
  els.kpiWrong.textContent = wrong;

  const max = totalMaxMarks();
  const s = totalScore();
  els.scoreLine.textContent = max ? `${s.toFixed(1)} / ${max}` : "-";
  els.summaryLine.innerHTML = currentSet.length
    ? `<b>${full}</b> full, <b>${partial}</b> partial, <b>${wrong}</b> wrong, <b>${currentSet.length-checked}</b> unchecked.`
    : "Start a set to begin.";
}

function renderChoice(q, idx){
  const name = `q_${q._instanceId}`;
  return `
    <label class="choice">
      <input type="radio" name="${name}" value="${idx}" />
      <div class="choiceText">${q.choices[idx]}</div>

function renderQuestionCard(q, index){
  const qnum = index+1;
  const tags = q.tags.map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join("");
  let inputHTML = "";
  if(q.type==="mcq"){
    inputHTML = q.choices.map((_,i)=>renderChoice(q,i)).join("")
      + `<div style="margin-top:8px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
           <button class="btn" data-action="check" data-qid="${q._instanceId}">Check</button>
           <span class="small">Tip: click an option then press Enter.</span>
         </div>`;
  } else {
    const ph = q.type==="numeric" ? "Type a number (include units if you can)" : "Type your answer…";
    inputHTML = `<div class="answerbox">
      <input type="text" id="in_${q._instanceId}" placeholder="${ph}" />
      <button class="btn" data-action="check" data-qid="${q._instanceId}">Check</button>
    </div>
    <div class="small">Tip: press Enter to submit this question.</div>`;
  }
  return `
  <div class="qcard" id="card_${q._instanceId}">
    <div class="qhead">
      <div>
        <div class="qnum">Q${qnum} • ${qMaxMarks(q)} mark${qMaxMarks(q)===1?"":"s"}</div>
        <div class="qtext">${q.prompt}</div>
      </div>
      <div class="tags">${tags}</div>
    </div>
    ${inputHTML}
    <div id="fb_${q._instanceId}"></div>
  </div>`;
}
function renderQuiz(){
  els.quiz.innerHTML = currentSet.map(renderQuestionCard).join("");
  renderKPIs();
  els.statusPill.textContent = "In progress";
  els.setPill.textContent = `${currentSet.length} Q set`;
  els.newSetBtn.disabled = false;
  els.revealAllBtn.disabled = false;

  for(const q of currentSet){
    if(q.type === "numeric" || q.type === "short"){
      const inp = document.getElementById(`in_${q._instanceId}`);
      if(inp){
        inp.addEventListener("keydown", (e) => {
          if(e.key === "Enter"){
            e.preventDefault();
            checkAndShow(q._instanceId);
          }
        });
      }
    } else if(q.type === "mcq"){
      const card = document.getElementById(`card_${q._instanceId}`);
      if(card){
        card.addEventListener("keydown", (e) => {
          if(e.key === "Enter"){
            const active = document.activeElement;
            if(card.contains(active)){
              e.preventDefault();
              checkAndShow(q._instanceId);
            }
          }
        });
        card.setAttribute("tabindex","-1");
      }
    }
  }
}

function getMCQSelection(q){
  const name = `q_${q._instanceId}`;
  const sel = document.querySelector(`input[name="${name}"]:checked`);
  return sel ? Number(sel.value) : null;
}
function textIncludesAny(t, arr){ return arr.some(x => t.includes(norm(x))); }

function checkShortMarkPoints(q, raw){
  const t = norm(raw);
  const points = q.markPoints || [];
  let got = 0;
  const missing = [];
  for(const mp of points){
    if(mp.any){
      const ok = textIncludesAny(t, mp.any);
      if(ok) got += 1; else missing.push(mp.any[0]);
    }
  }
  const max = qMaxMarks(q);
  const status = (got===0) ? "wrong" : (got===max ? "full" : "partial");
  return {score:got, max, status, missing, auto:true};
}
function expectedUnitInfo(unitHint){
  if(!unitHint) return null;
  const info = unitInfo(unitHint);
  if(!info) return null;
  return {...info, token: unitHint};
}
function checkNumeric(q, raw){
  const parsed = parseQuantity(raw);
  if(!parsed.ok) return {checked:false, msg:"Enter a number (you can add units)."};

  const exp = expectedUnitInfo(q.unitHint || "");
  const unitNeeded = !!exp;
  const max = qMaxMarks(q);
  const trueVal = q.answer;

  const rm = roundingMatch(parsed.num, trueVal, parsed.numStr);
  const okNumeric = rm.ok;
  const badRound = okNumeric ? null : closeButBadRounding(parsed.num, trueVal, parsed.numStr, q.relTol ?? 0.03);

  let unitMsg = "";
  let unitOkForFull = true;
  if(unitNeeded){
    if(!parsed.unitPresent){
      unitOkForFull = false;
      unitMsg = "Unit missing.";
    } else {
      const info = unitInfo(parsed.unitToken);
      if(!info || info.type !== exp.type){
        unitOkForFull = false;
        unitMsg = "Unit looks wrong for this quantity.";
      } else if(info.caseOk === false){
        unitOkForFull = false;
        unitMsg = `Unit case matters: use ${exp.canonical} exactly.`;
      } else {
        unitOkForFull = true;
      }
    }
  }

  let status="wrong", score=0, reason="";
  if(okNumeric && unitOkForFull){
    status="full"; score=max;
  } else if(okNumeric && unitNeeded){
    status="partial"; score=max/2;
    reason = unitMsg || "Number correct but unit not accepted.";
  } else if(badRound){
    status="partial"; score=max/2;
    const tgtStr = fmtRounded(badRound.target, {dp: badRound.dp, sf: badRound.sf});
    reason = `Close, but rounding is off. To ${badRound.basis}, it should be ${tgtStr}. ${badRound.hint}`;
  }
  return {checked:true, status, score, max, reason, unitMsg, auto:false};
}
function checkQuestion(q){
  if(q.type==="mcq"){
    const sel = getMCQSelection(q);
    if(sel === null) return {checked:false, msg:"Choose an option first."};
    const correct = sel === q.answerIndex;
    const max = qMaxMarks(q);
    return {checked:true, status: correct ? "full" : "wrong", score: correct ? max : 0, max, auto:false};
  }
  if(q.type==="numeric"){
    const input = document.getElementById(`in_${q._instanceId}`);
    return checkNumeric(q, input ? input.value : "");
  }
  if(q.type==="short"){
    const input = document.getElementById(`in_${q._instanceId}`);
    const raw = input ? input.value : "";
    if(!raw.trim()) return {checked:false, msg:"Type an answer first."};
    const out = checkShortMarkPoints(q, raw);
    return {checked:true, ...out};
  }
  return {checked:false, msg:"Unsupported question type."};
}
function formatCorrectLine(q){
  if(q.type==="mcq") {
    const raw = q.choices[q.answerIndex];
    const stripped = raw.replace(/<[^>]*>/g,'').trim();
    return `Correct answer: ${stripped || ("Option " + String.fromCharCode(65+q.answerIndex))}`;
  }
  if(q.type==="numeric"){
    const a = q.answer;
    const rounded = (Math.abs(a) >= 1000 || Math.abs(a) < 0.01) ? a.toExponential(3) : a.toPrecision(4);
    const unitShow = q.unitHint ? q.unitHint.replace("^2","²") : "";
    return `Correct answer: ${rounded}${unitShow ? " " + unitShow : ""}`;
  }
  if(q.type==="short"){
    return `Mark scheme: ${qMaxMarks(q)} point(s).`;
  }
  return "";
}
function autoWarnHTML(maxMarks){
  return `
    <div class="autoWarn">
      <div class="h">AUTO-MARKING WARNING (NOT AI MARKING)</div>
      <div class="b">
        This question has <b>not</b> been properly marked. The checker only looks for the <b>presence of a few keywords/phrases</b>.
        It can miss good answers and it can also give credit to weak answers. Use the mark scheme and judge it yourself.
      </div>
      <div class="selfMarkRow">
        <div class="note"><b>If you like</b>, type the marks you think you deserved (0 to ${maxMarks}) and apply it:</div>
        <input type="number" min="0" max="${maxMarks}" step="0.5" data-selfmark />
        <button class="btn" data-action="applySelfMark">Apply</button>
      </div>
    </div>`;
}
function showFeedback(q, outcome){
  const fb = document.getElementById(`fb_${q._instanceId}`);
  if(!fb) return;
  if(!outcome.checked){
    fb.innerHTML = `<div class="feedback bad"><div class="title">Not checked</div><p class="explain">${escapeHtml(outcome.msg)}</p></div>`;
    return;
  }
  const correctLine = formatCorrectLine(q);
  const good = outcome.status === "full";
  const partial = outcome.status === "partial";
  const title = good ? "Correct" : (partial ? "Partly correct" : "Not quite");
  const cls = good ? "good" : (partial ? "" : "bad");
  let diag = "";
  if(outcome.unitMsg) diag += outcome.unitMsg + "\n";
  if(outcome.reason) diag += outcome.reason + "\n";
  if(outcome.auto){
    diag = "AUTO-MARKING WARNING: keyword presence only. Self-check required.\n\n" + diag;
    if(outcome.status !== "full" && outcome.missing && outcome.missing.length){
      diag += `Missing ideas (examples): ${outcome.missing.slice(0,3).join("; ")}\n`;
    }
  }
  const explainText = (diag ? (diag + "\n") : "") + (q.explanation || "");
  const open = !good;
  const warn = outcome.auto ? autoWarnHTML(qMaxMarks(q)) : "";
  fb.innerHTML = `
    <div class="feedback ${cls}">
      <div class="title">${title} (${(outcome.score??0).toFixed(1)} / ${(outcome.max??qMaxMarks(q)).toFixed(1)} marks)</div>
      <p class="explain">${escapeHtml(correctLine)}</p>
      ${warn}
      <details ${open ? "open" : ""}>
        <summary>${good ? "Show explanation" : "Explanation (mark-scheme style)"}</summary>
        <p class="model">${escapeHtml(explainText)}</p>
      </details>
    </div>`;
}

function updateSetFromUI(){
  const pool = buildPool();
  const n = Number(els.numQ.value);
  if(pool.length < 1){
    els.quiz.innerHTML = `<div class="hint">No questions available — select at least one topic.</div>`;
    return false;
  }
  const chosen = shuffle(pool).slice(0, clamp(n, 5, pool.length)).map(expandQuestion);
  const now = Date.now().toString(36);
  currentSet = chosen.map((q,i)=> ({...q, _instanceId:`${q.id}_${now}_${i}`}));
  answered = new Map();
  renderQuiz();
  return true;
}
els.startBtn.addEventListener("click", updateSetFromUI);
els.newSetBtn.addEventListener("click", updateSetFromUI);

els.revealAllBtn.addEventListener("click", () => {
  currentSet.forEach(q => {
    const fb = document.getElementById(`fb_${q._instanceId}`);
    let expl = q.explanation || "";
    const warn = (q.type==="short" && q.markPoints) ? autoWarnHTML(qMaxMarks(q)) : "";
    if(q.type==="short" && q.markPoints){
      expl = "AUTO-MARKING WARNING (NOT AI): keyword presence only. Self-check required.\n\n" + expl;
    }
    fb.innerHTML = `
      <div class="feedback">
        <div class="title">Mark scheme</div>
        <p class="explain">${escapeHtml(formatCorrectLine(q))}</p>
        ${warn}
        <details open>
          <summary>Explanation</summary>
          <p class="model">${escapeHtml(expl)}</p>
        </details>
      </div>`;
  });
  els.statusPill.textContent = "Revealed";
});

function checkAndShow(qid){
  const q = currentSet.find(x => x._instanceId === qid);
  if(!q) return;
  const outcome = checkQuestion(q);
  showFeedback(q, outcome);
  if(outcome.checked){
    answered.set(q._instanceId, {checked:true, status: outcome.status, score: outcome.score, max: outcome.max ?? qMaxMarks(q), auto: !!outcome.auto});
    renderKPIs();
  }
}

els.quiz.addEventListener("click", (e) => {
  const btnCheck = e.target.closest("button[data-action='check']");
  if(btnCheck){
    const qid = btnCheck.getAttribute("data-qid");
    checkAndShow(qid);
    return;
  }
  const btnSelf = e.target.closest("button[data-action='applySelfMark']");
  if(btnSelf){
    const card = e.target.closest(".qcard");
    if(!card) return;
    const qid = card.id.replace("card_","");
    const q = currentSet.find(x => x._instanceId === qid);
    if(!q) return;
    const input = card.querySelector("input[data-selfmark]");
    if(!input) return;
    const val = Number(input.value);
    if(Number.isNaN(val)) return;

    const max = qMaxMarks(q);
    const adj = clamp(val, 0, max);

    const isAuto = (q.type==="short" && Array.isArray(q.markPoints));
    if(!isAuto) return;

    const status = (adj===0) ? "wrong" : (adj===max ? "full" : "partial");
    answered.set(qid, {checked:true, status, score:adj, max, auto:true, selfOverride:true});

    const fb = document.getElementById(`fb_${qid}`);
    if(fb){
      const titleEl = fb.querySelector(".feedback .title");
      if(titleEl){
        titleEl.textContent = `Self-mark applied (${adj.toFixed(1)} / ${max.toFixed(1)} marks)`;
      }
    }
    renderKPIs();
    return;
  }
});
els.quiz.addEventListener("keydown", (e) => {
  const inp = e.target.closest("input[data-selfmark]");
  if(inp && e.key === "Enter"){
    e.preventDefault();
    const btn = e.target.closest(".qcard")?.querySelector("button[data-action='applySelfMark']");
    if(btn) btn.click();
  }
});
renderKPIs();
</script>
</body>
</html>
